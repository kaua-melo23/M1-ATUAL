<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Lanchonete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Estilo para destacar o link da página atual */
        .nav-link-active { @apply bg-blue-600 text-white; }
    </style>
</head>
<body class="bg-gray-100 flex overflow-hidden">

    <aside id="sidebar" class="sidebar-transition w-64 bg-slate-900 h-screen flex flex-col text-white z-50 shadow-2xl">
        <div class="p-6 flex items-center justify-between border-b border-slate-700 min-h-[80px]">
            <span id="logo-text" class="font-black italic text-xl text-blue-400">ADMIN</span>
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-800 rounded-xl transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>

        <nav id="admin-nav" class="flex-1 p-4 space-y-2 overflow-y-auto no-scrollbar">
            <!-- Preenchido dinamicamente via JS -->
        </nav>
        
        <div class="p-4 border-t border-slate-700">
            <a href="/logout" class="flex items-center gap-4 p-3 rounded-xl hover:bg-red-600/20 transition-all text-red-400 group">
                <span class="text-xl">🚪</span> 
                <span class="nav-text font-bold">Sair</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 h-screen overflow-y-auto p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const navTexts = document.querySelectorAll('.nav-text');
            const logoText = document.getElementById('logo-text');
            
            if (sidebar.classList.contains('w-64')) {
                sidebar.classList.replace('w-64', 'w-20');
                logoText.classList.add('hidden');
                navTexts.forEach(t => t.classList.add('hidden'));
            } else {
                sidebar.classList.replace('w-20', 'w-64');
                setTimeout(() => {
                    logoText.classList.remove('hidden');
                    navTexts.forEach(t => t.classList.remove('hidden'));
                }, 100); 
            }
        }

        async function carregarMenuAdmin() {
            try {
                const [resMenu, resPerms] = await Promise.all([
                    fetch('/api/menu-admin'),
                    fetch('/api/gpo/minhas-permissoes'),
                ]);
                const itens = await resMenu.json();
                const { role, permissoes, paginas_permissao } = await resPerms.json();

                const nav = document.getElementById('admin-nav');
                const currentPath = window.location.pathname;
                nav.innerHTML = '';

                itens.forEach(item => {
                    if (!item.visivel) return;

                    // Verifica se o usuário tem permissão para esta página
                    if (role !== 'admin') {
                        const permNecessaria = paginas_permissao[item.url];
                        // Se a página exige permissão e o usuário não tem → oculta
                        if (permNecessaria && !permissoes.includes(permNecessaria) && !permissoes.includes('acesso_admin')) {
                            return;
                        }
                        // Páginas sem mapeamento definido (ex: /admin/gpo) → apenas admin
                        if (permNecessaria === null || permNecessaria === undefined) {
                            if (permissoes.length === 0) return; // sem permissão alguma
                        }
                    }

                    const isActive = item.url === currentPath;
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.className = `flex items-center gap-4 p-3 rounded-xl transition-all group ${isActive ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`;
                    a.innerHTML = `<span class="text-xl">${item.emoji}</span><span class="nav-text font-bold">${item.label}</span>`;
                    nav.appendChild(a);
                });
            } catch(e) {
                console.error('Erro ao carregar menu:', e);
            }
        }

        carregarMenuAdmin();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
